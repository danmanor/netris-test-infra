---
- name: Discover Netris controller URL
  ansible.builtin.shell:
    cmd: kubectl get svc traefik -n kube-system -o jsonpath='{.spec.ports[?(@.name=="web")].nodePort}'
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  register: _traefik_nodeport
  changed_when: false

- name: Set controller URL
  ansible.builtin.set_fact:
    netris_controller_url: "http://localhost:{{ _traefik_nodeport.stdout }}"

- name: Authenticate to Netris controller
  ansible.builtin.include_role:
    name: netris.controller.auth

- name: Create VPC for OCP
  ansible.builtin.include_role:
    name: netris.controller.vpc
  vars:
    vpc_name: "{{ ocp_vpc_name }}"
    vpc_state: present
    vpc_tenant_id: 1

- name: Create IPAM allocation for OCP
  ansible.builtin.include_role:
    name: netris.controller.ipam
  vars:
    ipam_state: create_allocation
    ipam_name: "{{ ocp_vpc_name }}-allocation"
    ipam_cidr: "{{ ocp_subnet_cidr }}"
    ipam_tenant_id: 1
    ipam_vpc_id: "{{ vpc_id }}"

- name: Create IPAM subnet for OCP
  ansible.builtin.include_role:
    name: netris.controller.ipam
  vars:
    ipam_state: create_subnet
    ipam_name: "{{ ocp_vpc_name }}-subnet"
    ipam_cidr: "{{ ocp_subnet_cidr }}"
    ipam_purpose: common
    ipam_site_id: 1
    ipam_tenant_id: 1
    ipam_vpc_id: "{{ vpc_id }}"

- name: Create VNet for OCP server
  ansible.builtin.include_role:
    name: netris.controller.vnet
  vars:
    vnet_name: "{{ ocp_vnet_name }}"
    vnet_state: present
    vnet_vpc_id: "{{ vpc_id }}"
    vnet_site_id: 1
    vnet_tenant_id: 1
    vnet_gateway: "{{ ocp_gateway }}"
    vnet_dhcp_enabled: true
    vnet_ports: "{{ ocp_server_ports }}"

- name: Create SNAT rule for OCP VNet
  ansible.builtin.include_role:
    name: netris.controller.nat
  vars:
    nat_name: "{{ ocp_vpc_name }}-snat"
    nat_state: present
    nat_action: snat
    nat_site_id: 1
    nat_vpc_id: "{{ vpc_id }}"
    nat_source_address: "{{ ocp_subnet_cidr }}"
    nat_snat_to_ip: "{{ ocp_snat_ip }}"

- name: Create DNAT rule for OCP (API + Ingress)
  ansible.builtin.include_role:
    name: netris.controller.nat
  vars:
    nat_name: "{{ ocp_vpc_name }}-dnat"
    nat_state: present
    nat_action: dnat
    nat_protocol: all
    nat_site_id: 1
    nat_vpc_id: "{{ vpc_id }}"
    nat_destination_address: "{{ ocp_dnat_ip }}/32"
    nat_dnat_to_ip: "{{ ocp_node_ip }}"

- name: Report Netris networking configuration
  ansible.builtin.debug:
    msg: "Netris configured: VPC={{ ocp_vpc_name }}, VNet={{ ocp_vnet_name }}, Subnet={{ ocp_subnet_cidr }}, DNAT={{ ocp_dnat_ip }} → {{ ocp_node_ip }}"
