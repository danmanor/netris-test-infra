---
- name: Check if Assisted Service is already running with correct IP
  ansible.builtin.shell:
    cmd: podman exec assisted-installer-service env 2>/dev/null | grep -q "SERVICE_BASE_URL=http://{{ assisted_service_ip }}:8090"
  register: _ai_check
  failed_when: false
  changed_when: false

- name: Remove Assisted Service with wrong IP
  ansible.builtin.command:
    cmd: podman pod rm -f assisted-installer
  when: _ai_check.rc != 0
  register: _ai_remove
  failed_when: false
  changed_when: _ai_remove.rc == 0

- name: Remove stale aicli config files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ playbook_dir }}/pod.yml"
    - "{{ playbook_dir }}/configmap.yml"
    - /root/pod.yml
    - /root/configmap.yml
  when: _ai_check.rc != 0

- name: Wait for pod cleanup
  ansible.builtin.pause:
    seconds: 5
  when: _ai_remove is changed

- name: Deploy local Assisted Service
  ansible.builtin.command:
    cmd: aicli create onprem -P onprem_ip={{ assisted_service_ip }}
  when: _ai_check.rc != 0
  changed_when: true

- name: Wait for Assisted Service API
  ansible.builtin.uri:
    url: "{{ assisted_service_url }}/api/assisted-install/v2/clusters"
    method: GET
    status_code: [200]
  register: _ai_ready
  until: _ai_ready is not failed
  retries: 30
  delay: 10

- name: Install dnsmasq
  ansible.builtin.dnf:
    name: dnsmasq
    state: present

- name: Configure DNS for OCP SNO
  ansible.builtin.copy:
    content: |
      address=/api.{{ ocp_cluster_name }}.{{ ocp_base_domain }}/{{ ocp_dnat_ip }}
      address=/.apps.{{ ocp_cluster_name }}.{{ ocp_base_domain }}/{{ ocp_dnat_ip }}
    dest: /etc/dnsmasq.d/ocp-sno.conf
    mode: "0644"
  notify: restart dnsmasq

- name: Enable and start dnsmasq
  ansible.builtin.systemd:
    name: dnsmasq
    state: started
    enabled: true

- name: Add localhost as DNS resolver
  ansible.builtin.lineinfile:
    path: /etc/resolv.conf
    insertbefore: BOF
    line: "nameserver 127.0.0.1"
    state: present

- name: Report Assisted Service status
  ansible.builtin.debug:
    msg: "Assisted Service ready at {{ assisted_service_url }}, DNS configured for {{ ocp_cluster_name }}.{{ ocp_base_domain }}"
