---
- name: Load netris-lab variables
  ansible.builtin.include_vars:
    file: "{{ netris_lab_dir }}/group_vars/all.yml"

- name: Set gather directory
  ansible.builtin.set_fact:
    _gather_dir: "/var/log/netris-gather/{{ ansible_date_time.iso8601_basic_short }}"

- name: Create gather subdirectories
  ansible.builtin.file:
    path: "{{ _gather_dir }}/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - host
    - networking
    - libvirt
    - k3s
    - netris
    - openvpn
    - socat
    - assisted-installer
    - ocp
    - osac
    - systemd
    - journal

# ── Host ──
- name: Gather uptime
  ansible.builtin.shell: uptime > {{ _gather_dir }}/host/uptime 2>&1
  changed_when: false
  failed_when: false

- name: Gather memory usage
  ansible.builtin.shell: free -h > {{ _gather_dir }}/host/memory 2>&1
  changed_when: false
  failed_when: false

- name: Gather disk usage
  ansible.builtin.shell: df -h > {{ _gather_dir }}/host/disk 2>&1
  changed_when: false
  failed_when: false

- name: Gather CPU info
  ansible.builtin.shell: lscpu > {{ _gather_dir }}/host/cpu 2>&1
  changed_when: false
  failed_when: false

- name: Gather OS and kernel
  ansible.builtin.shell: "{ uname -a; echo; cat /etc/os-release; } > {{ _gather_dir }}/host/os 2>&1"
  changed_when: false
  failed_when: false

# ── Networking ──
- name: Gather br-mgmt status
  ansible.builtin.shell: ip -d link show {{ mgmt_bridge_name }} > {{ _gather_dir }}/networking/br-mgmt 2>&1 || echo "not found" > {{ _gather_dir }}/networking/br-mgmt
  changed_when: false
  failed_when: false

- name: Gather br-public status
  ansible.builtin.shell: ip -d link show {{ public_bridge_name }} > {{ _gather_dir }}/networking/br-public 2>&1 || echo "not found" > {{ _gather_dir }}/networking/br-public
  changed_when: false
  failed_when: false

- name: Gather IP addresses
  ansible.builtin.shell: ip -4 addr show > {{ _gather_dir }}/networking/ip-addresses 2>&1
  changed_when: false
  failed_when: false

- name: Gather routes
  ansible.builtin.shell: ip route show > {{ _gather_dir }}/networking/routes 2>&1
  changed_when: false
  failed_when: false

- name: Gather iptables rules
  ansible.builtin.shell: iptables-save > {{ _gather_dir }}/networking/iptables 2>&1 || echo "iptables not available" > {{ _gather_dir }}/networking/iptables
  changed_when: false
  failed_when: false

- name: Gather nftables ruleset
  ansible.builtin.shell: nft list ruleset > {{ _gather_dir }}/networking/nftables 2>&1 || echo "nftables not available" > {{ _gather_dir }}/networking/nftables
  changed_when: false
  failed_when: false

# ── Libvirt/KVM ──
- name: Gather VM list
  ansible.builtin.shell: virsh list --all > {{ _gather_dir }}/libvirt/vm-list 2>&1
  changed_when: false
  failed_when: false

# ── K3s ──
- name: Gather K3s nodes
  ansible.builtin.shell: kubectl get nodes -o wide > {{ _gather_dir }}/k3s/nodes 2>&1
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false
  failed_when: false

- name: Gather K3s pods (all namespaces)
  ansible.builtin.shell: kubectl get pods --all-namespaces -o wide > {{ _gather_dir }}/k3s/pods-all 2>&1
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false
  failed_when: false

- name: Gather Netris controller pods
  ansible.builtin.shell: kubectl get pods -n netris-controller -o wide > {{ _gather_dir }}/k3s/pods-netris-controller 2>&1
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false
  failed_when: false

# ── Netris controller API ──
- name: Check Netris controller API
  ansible.builtin.shell: "curl -sf -o /dev/null -w '%{http_code}' http://localhost:{{ controller_ui_port }} > {{ _gather_dir }}/netris/api-status 2>&1 || echo 'unreachable' > {{ _gather_dir }}/netris/api-status"
  changed_when: false
  failed_when: false

# ── OpenVPN ──
- name: Gather tun0 interface
  ansible.builtin.shell: ip addr show tun0 > {{ _gather_dir }}/openvpn/tun0 2>&1 || echo "tun0 not found" > {{ _gather_dir }}/openvpn/tun0
  changed_when: false
  failed_when: false

# ── socat forwarders ──
- name: Gather socat forwarder units
  ansible.builtin.shell: systemctl list-units 'socat-forwarder@*' --all --no-pager > {{ _gather_dir }}/socat/forwarder-units 2>&1 || echo "no units" > {{ _gather_dir }}/socat/forwarder-units
  changed_when: false
  failed_when: false

# ── Assisted Installer ──
- name: Check Assisted Installer API
  ansible.builtin.shell: "curl -sf -o /dev/null -w '%{http_code}' {{ assisted_service_url }}/api/assisted-install/v2/clusters > {{ _gather_dir }}/assisted-installer/api-status 2>&1 || echo 'unreachable' > {{ _gather_dir }}/assisted-installer/api-status"
  changed_when: false
  failed_when: false

- name: Gather Assisted Installer clusters
  ansible.builtin.shell: aicli -u {{ assisted_service_url }} list cluster > {{ _gather_dir }}/assisted-installer/clusters 2>&1 || echo "aicli unavailable" > {{ _gather_dir }}/assisted-installer/clusters
  changed_when: false
  failed_when: false

# ── OCP cluster ──
- name: Gather OCP nodes
  ansible.builtin.shell: oc get nodes -o wide > {{ _gather_dir }}/ocp/nodes 2>&1 || echo "OCP not reachable" > {{ _gather_dir }}/ocp/nodes
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false
  failed_when: false

- name: Gather OCP cluster operators
  ansible.builtin.shell: oc get clusteroperators > {{ _gather_dir }}/ocp/cluster-operators 2>&1 || echo "cluster operators unavailable" > {{ _gather_dir }}/ocp/cluster-operators
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false
  failed_when: false

- name: Gather OSAC namespace pods
  ansible.builtin.shell: oc get pods -n {{ osac_namespace }} -o wide > {{ _gather_dir }}/ocp/pods-osac 2>&1 || echo "OSAC namespace not found" > {{ _gather_dir }}/ocp/pods-osac
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false
  failed_when: false

# ── OSAC ──
- name: Gather OSAC Helm releases
  ansible.builtin.shell: helm list -n {{ osac_namespace }} > {{ _gather_dir }}/osac/helm-releases 2>&1 || echo "no helm releases" > {{ _gather_dir }}/osac/helm-releases
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false
  failed_when: false

- name: Gather OSAC deployments
  ansible.builtin.shell: oc get deployments -n {{ osac_namespace }} > {{ _gather_dir }}/osac/deployments 2>&1 || echo "no deployments" > {{ _gather_dir }}/osac/deployments
  environment:
    KUBECONFIG: /root/.kube/config
  changed_when: false
  failed_when: false

# ── systemd ──
- name: Gather failed systemd units
  ansible.builtin.shell: systemctl --failed --no-pager > {{ _gather_dir }}/systemd/failed-units 2>&1
  changed_when: false
  failed_when: false

# ── Journal ──
- name: Gather recent journal errors
  ansible.builtin.shell: journalctl -p err --no-pager -n 100 > {{ _gather_dir }}/journal/errors 2>&1
  changed_when: false
  failed_when: false

# ── Symlink + report ──
- name: Create latest symlink
  ansible.builtin.file:
    src: "{{ _gather_dir }}"
    dest: /var/log/netris-gather/latest
    state: link
    force: true

- name: Print gather location
  ansible.builtin.debug:
    msg: "Diagnostics saved to {{ _gather_dir }} (symlinked at /var/log/netris-gather/latest)"
