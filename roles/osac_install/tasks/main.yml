---
- name: Clone osac-installer
  ansible.builtin.git:
    repo: "{{ osac_installer_repo }}"
    dest: "{{ osac_installer_dir }}"
    version: "{{ osac_installer_branch }}"
    force: true

- name: Initialize submodules
  ansible.builtin.command:
    cmd: git submodule update --init --recursive --remote
    chdir: "{{ osac_installer_dir }}"
  changed_when: true

- name: Ensure overlay files directory exists
  ansible.builtin.file:
    path: "{{ osac_installer_dir }}/overlays/{{ osac_kustomize_overlay }}/files"
    state: directory
    mode: "0755"

- name: Copy AAP license file to overlay
  ansible.builtin.copy:
    src: "{{ osac_license_path }}"
    dest: "{{ osac_installer_dir }}/overlays/{{ osac_kustomize_overlay }}/files/license.zip"
    remote_src: true
    mode: "0644"

- name: Copy pull secret to overlay
  ansible.builtin.copy:
    src: "{{ pull_secret_path }}"
    dest: "{{ osac_installer_dir }}/overlays/{{ osac_kustomize_overlay }}/files/quay-pull-secret.json"
    remote_src: true
    mode: "0644"

- name: Install oc CLI
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/stable/openshift-client-linux.tar.gz \
        | tar xzf - -C /usr/local/bin oc kubectl
    creates: /usr/local/bin/oc

- name: Install helm
  ansible.builtin.command:
    cmd: bash -c "curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash"
    creates: /usr/local/bin/helm

- name: Install osac CLI
  ansible.builtin.shell:
    cmd: |
      curl -L -o /usr/local/bin/osac \
        https://github.com/osac-project/fulfillment-service/releases/latest/download/osac_Linux_x86_64
      chmod +x /usr/local/bin/osac
    creates: /usr/local/bin/osac

- name: Get cluster apps domain
  ansible.builtin.shell:
    cmd: oc get ingresses.config/cluster -o jsonpath='{.spec.domain}'
  environment:
    KUBECONFIG: /root/.kube/config
  register: _apps_domain
  changed_when: false

- name: Set fulfillment hostnames in values file
  ansible.builtin.replace:
    path: "{{ osac_installer_dir }}/{{ osac_values_file }}"
    regexp: "{{ item.key }}:.*"
    replace: "{{ item.key }}: fulfillment-{{ item.suffix }}-{{ osac_namespace }}.{{ _apps_domain.stdout }}"
  loop:
    - { key: "externalHostname", suffix: "api" }
    - { key: "internalHostname", suffix: "internal-api" }

- name: Run OSAC setup.sh
  ansible.builtin.command:
    cmd: ./scripts/setup.sh
    chdir: "{{ osac_installer_dir }}"
  environment:
    KUBECONFIG: /root/.kube/config
    DEPLOY_MODE: helm
    INSTALLER_NAMESPACE: "{{ osac_namespace }}"
    INSTALLER_KUSTOMIZE_OVERLAY: "{{ osac_kustomize_overlay }}"
    VALUES_FILE: "{{ osac_values_file }}"
    VIRT_SERVICE: "true"
    STORAGE_SERVICE: "true"
    INGRESS_SERVICE: "true"
  changed_when: true
  timeout: 3600

- name: Report OSAC installation complete
  ansible.builtin.debug:
    msg: "OSAC installed in namespace {{ osac_namespace }}"
