---
- name: Read SSH public key
  ansible.builtin.slurp:
    src: "{{ ssh_public_key_path }}"
  register: _ssh_pub_key

- name: Read pull secret
  ansible.builtin.slurp:
    src: "{{ pull_secret_path }}"
  register: _pull_secret
  no_log: true

- name: Ensure pull-secret exists in namespace
  ansible.builtin.shell:
    cmd: >
      oc get secret pull-secret -n {{ caas_discovery_infraenv_namespace }} ||
      oc create secret generic pull-secret -n {{ caas_discovery_infraenv_namespace }}
      --from-literal=.dockerconfigjson='{{ _pull_secret.content | b64decode | trim }}'
      --type=kubernetes.io/dockerconfigjson
  no_log: true
  register: _pull_secret_result
  changed_when: "'created' in _pull_secret_result.stdout"

- name: Create InfraEnv CR
  ansible.builtin.template:
    src: infraenv.yml.j2
    dest: /tmp/caas-infraenv.yml
    mode: "0600"

- name: Apply InfraEnv CR
  ansible.builtin.command:
    cmd: oc apply -f /tmp/caas-infraenv.yml
  register: _infraenv_apply
  changed_when: "'configured' in _infraenv_apply.stdout"

- name: Wait for discovery ISO URL
  ansible.builtin.shell:
    cmd: oc get infraenv {{ caas_discovery_infraenv_name }} -n {{ caas_discovery_infraenv_namespace }} -o jsonpath='{.status.isoDownloadURL}'
  register: _iso_url
  until: _iso_url.stdout | length > 0
  retries: 60
  delay: 10
  changed_when: false

- name: Download discovery ISO
  ansible.builtin.get_url:
    url: "{{ _iso_url.stdout }}"
    dest: /var/lib/libvirt/images/caas-discovery.iso
    mode: "0644"
    validate_certs: false
  register: _iso_download
  until: _iso_download is success
  retries: 30
  delay: 10

- name: Find discovery VMs
  ansible.builtin.shell:
    cmd: virsh list --all --name | grep "{{ item }}"
  register: _discovery_vm_lookup
  changed_when: false
  loop: "{{ caas_discovery_vm_patterns }}"

- name: Build VM name list
  ansible.builtin.set_fact:
    caas_discovery_vms: "{{ _discovery_vm_lookup.results | map(attribute='stdout_lines') | map('first') | list }}"

- name: Get VM states
  ansible.builtin.shell:
    cmd: virsh domstate {{ item }}
  register: _vm_states
  changed_when: false
  loop: "{{ caas_discovery_vms }}"

- name: Shut down running VMs
  ansible.builtin.command:
    cmd: virsh destroy {{ item.item }}
  when: item.stdout | trim == 'running'
  loop: "{{ _vm_states.results }}"
  loop_control:
    label: "{{ item.item }}"
  changed_when: true

- name: Get current vCPU count
  ansible.builtin.shell:
    cmd: virsh vcpucount {{ item }} --config --maximum
  register: _current_vcpus
  changed_when: false
  loop: "{{ caas_discovery_vms }}"

- name: Set maximum vCPUs
  ansible.builtin.command:
    cmd: virsh setvcpus {{ item.item }} {{ caas_discovery_vcpu }} --config --maximum
  when: item.stdout | int != caas_discovery_vcpu | int
  loop: "{{ _current_vcpus.results }}"
  loop_control:
    label: "{{ item.item }}"
  changed_when: true

- name: Set vCPUs
  ansible.builtin.command:
    cmd: virsh setvcpus {{ item.item }} {{ caas_discovery_vcpu }} --config
  when: item.stdout | int != caas_discovery_vcpu | int
  loop: "{{ _current_vcpus.results }}"
  loop_control:
    label: "{{ item.item }}"
  changed_when: true

- name: Get current max memory
  ansible.builtin.shell:
    cmd: virsh dommemstat {{ item }} | awk '/actual/{print int($2/1024)}'
  register: _current_memory
  changed_when: false
  loop: "{{ caas_discovery_vms }}"

- name: Set maximum memory
  ansible.builtin.command:
    cmd: virsh setmaxmem {{ item.item }} {{ caas_discovery_memory_mb }}M --config
  when: item.stdout | int != caas_discovery_memory_mb | int
  loop: "{{ _current_memory.results }}"
  loop_control:
    label: "{{ item.item }}"
  changed_when: true

- name: Set memory
  ansible.builtin.command:
    cmd: virsh setmem {{ item.item }} {{ caas_discovery_memory_mb }}M --config
  when: item.stdout | int != caas_discovery_memory_mb | int
  loop: "{{ _current_memory.results }}"
  loop_control:
    label: "{{ item.item }}"
  changed_when: true

- name: Get attached disks
  ansible.builtin.shell:
    cmd: virsh domblklist {{ item }} --details | awk 'NR>2 && $1=="file" {print $3}'
  register: _attached_disks
  changed_when: false
  loop: "{{ caas_discovery_vms }}"

- name: Detach existing disks
  ansible.builtin.shell:
    cmd: |
      for target in $(virsh domblklist {{ item.item }} --details | awk 'NR>2 && $1=="file" {print $3}'); do
        virsh detach-disk {{ item.item }} "$target" --config
      done
  when: item.stdout_lines | length > 0
  loop: "{{ _attached_disks.results }}"
  loop_control:
    label: "{{ item.item }}"
  changed_when: true

- name: Create empty boot disk for each VM
  ansible.builtin.command:
    cmd: qemu-img create -f qcow2 /var/lib/libvirt/images/{{ item }}-disk.qcow2 {{ caas_discovery_disk_gb }}G
    creates: /var/lib/libvirt/images/{{ item }}-disk.qcow2
  loop: "{{ caas_discovery_vms }}"

- name: Check if boot disk is attached
  ansible.builtin.shell:
    cmd: virsh domblklist {{ item }} | grep -q '{{ item }}-disk.qcow2'
  register: _boot_disk_attached
  failed_when: false
  changed_when: false
  loop: "{{ caas_discovery_vms }}"

- name: Attach boot disk
  ansible.builtin.command:
    cmd: virsh attach-disk {{ item.item }} /var/lib/libvirt/images/{{ item.item }}-disk.qcow2 vda --persistent --subdriver qcow2
  when: item.rc != 0
  loop: "{{ _boot_disk_attached.results }}"
  loop_control:
    label: "{{ item.item }}"
  changed_when: true

- name: Check if discovery ISO is attached
  ansible.builtin.shell:
    cmd: virsh domblklist {{ item }} | grep -q 'caas-discovery.iso'
  register: _iso_attached
  failed_when: false
  changed_when: false
  loop: "{{ caas_discovery_vms }}"

- name: Attach discovery ISO as cdrom
  ansible.builtin.command:
    cmd: virsh attach-disk {{ item.item }} /var/lib/libvirt/images/caas-discovery.iso sda --type cdrom --config
  when: item.rc != 0
  loop: "{{ _iso_attached.results }}"
  loop_control:
    label: "{{ item.item }}"
  changed_when: true

- name: Set boot order to disk then cdrom
  ansible.builtin.command:
    cmd: virt-xml {{ item }} --edit --boot hd,cdrom
  loop: "{{ caas_discovery_vms }}"
  register: _boot_order
  changed_when: "'--boot' not in _boot_order.stderr | default('')"

- name: Start discovery VMs
  ansible.builtin.command:
    cmd: virsh start {{ item.item }}
  when: item.stdout | trim != 'running'
  loop: "{{ _vm_states.results }}"
  loop_control:
    label: "{{ item.item }}"
  register: _vm_start
  failed_when: _vm_start.rc is defined and _vm_start.rc != 0
  changed_when: true

- name: Report CaaS discovery hosts started
  ansible.builtin.debug:
    msg: >-
      CaaS discovery: {{ caas_discovery_vms | length }} VMs booted with discovery ISO
      ({{ caas_discovery_vcpu }} vCPU, {{ caas_discovery_memory_mb }}MB RAM,
      {{ caas_discovery_disk_gb }}GB disk, boot order: disk,cdrom)
