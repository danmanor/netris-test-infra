# Netris Lab
netris_lab_dir: "{{ inventory_dir }}/../netris-lab"
ew_fabric_enable: 0

# Netris Controller (URL is discovered dynamically by netris_configure role)
netris_username: "netris"
netris_password: "netris"
netris_validate_certs: false

# OCP Server VM
ocp_vm_name_pattern: "hgx-pod00-su0-h00"
ocp_server_vcpu: 20
ocp_server_memory_gb: 64
ocp_install_disk_gb: 100
ocp_lvm_disk_gb: 200

# Netris Networking for OCP
ocp_vpc_name: "ocp-sno"
ocp_vnet_name: "ocp-sno-vnet"
ocp_subnet_cidr: "192.168.40.0/24"
ocp_gateway: "192.168.40.1/24"
ocp_node_ip: "192.168.40.2"
ocp_server_ports:
  - name: "eth9@hgx-pod00-su0-h00"
    accessMode: true
ocp_snat_ip: "198.51.100.1"
ocp_dnat_ip: "198.51.100.2"

# OCP Installation
ocp_version: "4.21"
ocp_cluster_name: "ocp-sno"
ocp_base_domain: "osac.local"
pull_secret_path: "/root/pull-secret"
ssh_public_key_path: "/root/.ssh/id_rsa.pub"
assisted_service_url: "http://localhost:8090"
assisted_service_ip: "198.51.100.9"

# OSAC Installer
osac_installer_repo: "https://github.com/osac-project/osac-installer.git"
osac_installer_branch: "main"
osac_installer_dir: "/opt/osac-installer"
osac_namespace: "osac-devel"
osac_kustomize_overlay: "osac-devel"
osac_values_file: "values/development/values.yaml"
osac_license_path: "{{ inventory_dir }}/../license.zip"

# OSAC Component Images (leave empty to use osac-installer defaults)
osac_operator_image: ""
fulfillment_service_image: ""
osac_aap_image: ""
osac_aap_branch: "main"
fulfillment_service_repo: "https://github.com/osac-project/fulfillment-service.git"
fulfillment_service_branch: "main"

# CaaS OCP Version
caas_ocp_version: "4.21"
caas_release_image: "quay.io/openshift-release-dev/ocp-release:{{ caas_ocp_version }}.0-multi"

# CaaS Discovery (boot remaining servers with discovery ISO)
caas_discovery_vm_patterns:
  - "hgx-pod00-su0-h01"
  - "hgx-pod00-su0-h02"
  - "hgx-pod00-su0-h03"
caas_discovery_vcpu: 4
caas_discovery_memory_mb: 16384
caas_discovery_disk_gb: 100
caas_discovery_infraenv_name: "infraenv"
caas_discovery_infraenv_namespace: "hardware-inventory"

# CaaS Setup (host type, agent annotations, cluster creation)
caas_agent_namespace: "{{ caas_discovery_infraenv_namespace }}"
caas_host_type_id: "ci-worker"
caas_host_type_title: "CI Worker"
caas_host_type_description: "Worker nodes for CI testing"
caas_cluster_template: "osac.templates.ocp_ci_small"
caas_cluster_name: "caas-ci-cluster"
caas_agents:
  - vm_pattern: "hgx-pod00-su0-h01"
    netris_server_name: "hgx-pod00-su0-h01"
  - vm_pattern: "hgx-pod00-su0-h02"
    netris_server_name: "hgx-pod00-su0-h02"
  - vm_pattern: "hgx-pod00-su0-h03"
    netris_server_name: "hgx-pod00-su0-h03"
